services:
  - type: web
    name: meal-metrics
    runtime: python
    buildCommand: |
      cd frontend && npm install && npx craco build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: mealmetrics
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20.11.0"
      - key: REACT_APP_BACKEND_URL
        value: ""
